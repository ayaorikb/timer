<script>
const members = ["佐藤","鈴木","田中"]; 
const interval = 15 * 60 * 1000;

const start = new Date("2026-02-28T22:57:00"); // ←あなたが設定した開始時刻に合わせる

function update() {
  const now = new Date();
  const diff = now - start;

  if (diff < 0) {
    document.getElementById("msg").textContent = "開始前";
    return;
  }

  const turn = Math.floor(diff / interval);
  const current = members[turn % members.length];

  const elapsedInCycle = diff % interval;
  const remaining = interval - elapsedInCycle;

  const minutes = Math.floor(remaining / 60000);
  const seconds = Math.floor((remaining % 60000) / 1000);

  const formatted =
    String(minutes).padStart(2, '0') + ":" +
    String(seconds).padStart(2, '0');

  document.getElementById("msg").innerHTML =
    "現在の担当：" + current + "<br><br>" +
    "次の交代まで：" + formatted;

  if (elapsedInCycle < 1000) {
    document.getElementById("sound").play();
  }
}

update();
setInterval(update, 1000);
</script>
