<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交代タイマー</title>

<style>
 body {
  background-color: #f0f8ff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

  #currentTime {
    font-size: 1.2em;
    margin: 10px;
  }

  #remainingTime {
    font-size: 1.5em;
    margin: 15px;
  }

#currentMember {
  font-size: 2.4em;
  font-weight: bold;
  border: 4px solid #ff9800;
  background-color: #fff3cd;
  padding: 20px 30px;
  margin: 25px auto;
  border-radius: 14px;
}
  #members span {
    display: inline-block;
   min-width: 90px;
    border: 2px solid #999;
    padding: 6px 10px;
    margin: 8px;
    border-radius: 10px;
    background-color: #ffffff;
   font-size: 1.1em;
   font-weight: 600;
   box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  
  #nextLabel {
  font-size: 1.2em;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>交代タイマー</h1>
<button id="enableSound">🔊 音を有効にする</button>
<div id="loading">読み込み中…</div>

  <div id="currentTime"></div>

  <div id="remainingTime"></div>

  <div id="currentMember"></div>
  <div id="nextLabel">次の担当</div>
  <div id="members"></div>
  
<script>
const members = ["佐藤", "坂本", "田中"];
const intervalMinutes = 2;
  
const startTime = new Date();
startTime.setHours( 0, 26, 0, 0); // 9時00分00秒開始

  // ===== 音の設定 =====
  let audioEnabled = false;
  let audioContext = null;
  let lastIndex = -1;
  let lastMinuteBeeped = false;
  
function playBeep() {
  if (!audioContext) return;

  const playOnce = (delay) => {
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "square";        // 目立つ音
    osc.frequency.value = 1000;
    gain.gain.value = 0.3;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start(audioContext.currentTime + delay);
    osc.stop(audioContext.currentTime + delay + 0.3);
  };

  playOnce(0);
  playOnce(0.4);
  playOnce(0.8);
}
document.getElementById("enableSound")
  .addEventListener("click", () => {

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    if (audioContext.state === "suspended") {
      audioContext.resume();
    }

    audioEnabled = true;
    document.getElementById("enableSound").style.display = "none";
  });

function updateTimer() {

  const loading = document.getElementById("loading");
  if (loading) loading.style.display = "none";

  const now = new Date();
  
if (now < startTime) {
  document.getElementById("remainingTime").textContent =
    "準備中";
  return;
}
  
  // 現在時刻
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("currentTime").textContent =
    `現在時刻：${h}時${m}分${s}秒`;

  // 経過時間
  const elapsedMs = now - startTime;
  const intervalMs = intervalMinutes * 60 * 1000;
  const cycle = Math.floor(elapsedMs / intervalMs);

  // 現在の担当
  const currentIndex = cycle % members.length;

  // 担当が切り替わったらリセット
if (currentIndex !== lastIndex) {
  lastIndex = currentIndex;
  lastMinuteBeeped = false;
}
  document.getElementById("currentMember").textContent =
    `現在の担当：${members[currentIndex]}`;

  // 残り時間
  const remainingMs = intervalMs - (elapsedMs % intervalMs);

  // 残り1分になった瞬間に音を鳴らす
  if (remainingMs <= 60000 && !lastMinuteBeeped) {
  if (audioEnabled) playBeep();
  lastMinuteBeeped = true;
}
  
  // 残り時間（秒単位で計算）
const remainingSeconds = Math.ceil(remainingMs / 1000);
const remMin = Math.floor(remainingSeconds / 60);
const remSec = remainingSeconds % 60;

document.getElementById("remainingTime").textContent =
  `次の交代まで：${remMin}分${String(remSec).padStart(2, "0")}秒`;

  const nextIndex = (currentIndex + 1) % members.length;
  const isLastMinute = remainingMs <= 60000;

  const membersDiv = document.getElementById("members");
  membersDiv.innerHTML = "";

  members.forEach((name, index) => {
    const span = document.createElement("span");

    if (isLastMinute && index === nextIndex) {
      span.textContent = "★ " + name;
      span.style.backgroundColor = "#ffe4e1";
      span.style.border = "2px solid red";
      span.style.color = "red";
      span.style.fontSize = "1.3em";
      span.style.fontWeight = "bold";
    } else {
      span.textContent = name;
    }
    membersDiv.appendChild(span);
  });
}

setInterval(updateTimer, 1000);
updateTimer();
</script>
