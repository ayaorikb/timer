<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交代タイマー</title>

<style>
  body {
    background-color: #f0f8ff;
    font-family: sans-serif;
    text-align: center;
  }

  #currentTime {
    font-size: 1.2em;
    margin: 10px;
  }

  #remainingTime {
    font-size: 1.5em;
    margin: 15px;
  }

  #currentMember {
    font-size: 2em;
    font-weight: bold;
    border: 3px solid #333;
    background-color: #ffe4b5;
    padding: 15px;
    margin: 20px auto;
    width: fit-content;
    border-radius: 10px;
  }

  #members span {
    display: inline-block;
    border: 1px solid #666;
    padding: 6px 10px;
    margin: 5px;
    border-radius: 6px;
    background-color: #ffffff;
  }

  #nextLabel {
  font-size: 1.2em;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>交代タイマー</h1>
<button id="soundBtn">🔊 音を有効にする</button>
<div id="loading">読み込み中…</div>

<audio id="sound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

  <div id="currentTime"></div>

  <div id="remainingTime"></div>

  <div id="currentMember"></div>

　<div id="nextLabel">次の担当</div>
　<div id="members"></div>
  
<script>
const members = ["佐藤", "坂本", "田中"];
const intervalMinutes = 2;
const startTime = new Date();
startTime.setHours(23, 47, 0, 0); // 9時00分00秒開始

  // ===== 音の設定 =====
  let audioEnabled = false;
  const beep = new Audio("beep.mp3");

  document.getElementById("enableSound").addEventListener("click", () => {
    beep.play().then(() => {
      audioEnabled = true;
      document.getElementById("enableSound").style.display = "none";
    }).catch(() => {
      alert("音を有効にできませんでした");
    });
  })

  let lastIndex = -1;
  let lastMinuteBeeped = false;
  
function updateTimer() {

  const loading = document.getElementById("loading");
  if (loading) loading.style.display = "none";

  const now = new Date();
  
if (now < startTime) {
  document.getElementById("remainingTime").textContent =
    "準備中";
  return;
}
  // 現在時刻
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("currentTime").textContent =
    `現在時刻：${h}時${m}分${s}秒`;

  // 経過時間
  const elapsedMs = now - startTime;
  const intervalMs = intervalMinutes * 60 * 1000;
  const cycle = Math.floor(elapsedMs / intervalMs);

  // 現在の担当
  const currentIndex = cycle % members.length;

  // 担当が切り替わったらリセット
if (currentIndex !== lastIndex) {
  lastIndex = currentIndex;
  lastMinuteBeeped = false;
}
  document.getElementById("currentMember").textContent =
    `現在の担当：${members[currentIndex]}`;

  // 残り時間
  const remainingMs = intervalMs - (elapsedMs % intervalMs);

  // 残り1分になった瞬間に音を鳴らす
if (remainingMs <= 60000 && !lastMinuteBeeped) {
  if (audioEnabled) {
    beep.play();
  }
  lastMinuteBeeped = true;
}
  
  // 次の担当インデックス
const nextIndex = (currentIndex + 1) % members.length;

// 残り1分未満なら強調
const isLastMinute = remainingMs <= 60000;
  const remMin = Math.floor(remainingMs / 60000);
  const remSec = Math.floor((remainingMs % 60000) / 1000);
  document.getElementById("remainingTime").textContent =
    `次の交代まで：${remMin}分${String(remSec).padStart(2, "0")}秒`;

  // メンバー一覧（常に表示）
  const membersDiv = document.getElementById("members");
  membersDiv.innerHTML = "";
members.forEach((name, index) => {
  const span = document.createElement("span");

  if (isLastMinute && index === nextIndex) {
    span.textContent = "★ " + name;
    span.style.backgroundColor = "#ffe4e1";
　　 span.style.border = "2px solid red";
    span.style.color = "red";
    span.style.fontSize = "1.3em";
    span.style.fontWeight = "bold";
  } else {
    span.textContent = name;
  }

  membersDiv.appendChild(span);
});
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
