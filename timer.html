<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交代タイマー</title>

<style>
 body {
  background-color: #f0f8ff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

 #alarmInfo {
  margin-top: 8px;
  font-size: 0.95em;
  color: #555;
}

#remainingTime {
  font-size: 2.4em;          /* 大きく */
  font-weight: 800;          /* 太く */
  color: #0d47a1;            /* 濃い青 */
  background: #e3f2fd;       /* 薄い青背景 */
  border: 4px solid #1976d2; /* 枠 */
  border-radius: 16px;
  padding: 18px 30px;
  margin: 25px auto;         /* ← これで左右中央 */
  width: fit-content;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);

  text-align: center;        /* ← 文字を中央 */
}
 
  #currentTime {
    font-size: 1.2em;
    margin: 10px;
  }

  #remainingTime {
    font-size: 1.5em;
    margin: 15px;
  }

#currentMember {
  font-size: 2.4em;
  font-weight: bold;
  border: 4px solid #ff9800;
  background-color: #fff3cd;
  padding: 20px 30px;
  margin: 25px auto;
  border-radius: 14px;
}
  #members span {
    display: inline-block;
   min-width: 90px;
    border: 2px solid #999;
    padding: 6px 10px;
    margin: 8px;
    border-radius: 10px;
    background-color: #ffffff;
   font-size: 1.1em;
   font-weight: 600;
   box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  
  #nextLabel {
  font-size: 1.2em;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: bold;
}

 #warning {
  font-size: 1.2em;
  font-weight: bold;
  color: red;
  margin-top: 20px;
  display: none;
 }
 
</style>
</head>

<body>

<h1>交代タイマー</h1>
<button id="enableSound">🔊 音を有効にする</button>
<p id="alarmInfo">※ 1分前と30秒前にアラームが鳴ります</p>
<div id="loading">読み込み中…</div>
 
  <div id="currentTime"></div>

  <div id="remainingTime"></div>

  <div id="currentMember"></div>
  <div id="nextLabel">次の担当</div>
  <div id="members"></div>
  <div id="warning"></div>
  
<script>
const members = [ "坂本", "上林"];
const intervalMinutes = 2;
  
const startTime = new Date();
startTime.setHours( 12, 30, 0, 0); // 9時00分00秒開始

  // ===== 音の設定 =====
  let audioEnabled = false;
  let audioContext = null;
  let lastIndex = -1;
  let lastMinuteBeeped = false;
 let last30SecBeeped = false;
  
function playBeep() {
  if (!audioContext) return;

  const playOnce = (delay) => {
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "triangle";        // 柔らかめの音
    osc.frequency.value = 900;
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start(audioContext.currentTime + delay);
    osc.stop(audioContext.currentTime + delay + 0.3);
  };

  playOnce(0);
  playOnce(0.4);
  playOnce(0.8);
}

  function playBeep30() {
  if (!audioContext) return;

  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.type = "triangle";     // ← 30秒用は柔らかめ
  osc.frequency.value = 1000; // 少し高い音
  gain.gain.value = 0.2;     // 柔らかめの音
  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start();
  osc.stop(audioContext.currentTime + 0.25);
}

document.getElementById("enableSound")
  .addEventListener("click", () => {

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    if (audioContext.state === "suspended") {
      audioContext.resume();
    }

    audioEnabled = true;
    document.getElementById("enableSound").style.display = "none";

    const info = document.getElementById("alarmInfo");
    if (info) info.style.display = "none";
  });

function updateTimer() {

  const loading = document.getElementById("loading");
  if (loading) loading.style.display = "none";

  const now = new Date();
  
if (now < startTime) {
  document.getElementById("remainingTime").textContent =
    "準備中";
  return;
}
  
  // 現在時刻
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("currentTime").textContent =
    `現在時刻：${h}時${m}分${s}秒`;

  // 経過時間
  const elapsedMs = now - startTime;
  const intervalMs = intervalMinutes * 60 * 1000;
  const cycle = Math.floor(elapsedMs / intervalMs);

  // 現在の担当
  const currentIndex = cycle % members.length;

  // 担当が切り替わったらリセット
if (currentIndex !== lastIndex) {
  lastIndex = currentIndex;
  lastMinuteBeeped = false;
  last30SecBeeped = false;
}
  document.getElementById("currentMember").textContent =
    `現在の担当：${members[currentIndex]}`;

  // 残り時間
  const remainingMs = intervalMs - (elapsedMs % intervalMs);

  // 残り1分になった瞬間に音を鳴らす
  if (remainingMs <= 60000 && !lastMinuteBeeped) {
  if (audioEnabled) playBeep();
  lastMinuteBeeped = true;
}

 // 残り30秒になった瞬間に音を鳴らす
if (remainingMs <= 30000 && !last30SecBeeped) {
  if (audioEnabled) playBeep30();
  last30SecBeeped = true;
}
  
  // 残り時間（秒単位で計算）
const remainingSeconds = Math.ceil(remainingMs / 1000);
const remMin = Math.floor(remainingSeconds / 60);
const remSec = remainingSeconds % 60;

document.getElementById("remainingTime").textContent =
  `次の交代まで：${remMin}分${String(remSec).padStart(2, "0")}秒`;

  const nextIndex = (currentIndex + 1) % members.length;
 
 // 背景色制御
if (remainingMs <= 30000) {
  document.body.style.backgroundColor = "#ffe5e5"; // 30秒：赤系
} else {
  document.body.style.backgroundColor = "#f0f8ff"; // 通常
}

  const membersDiv = document.getElementById("members");
  membersDiv.innerHTML = "";
  
const warningDiv = document.getElementById("warning");

if (warningDiv) {
  if (remainingMs <= 30000) {
    warningDiv.textContent = 'まもなく交代 音声オンタイムへ！';
    warningDiv.style.display = "block";
    warningDiv.style.fontSize = "1.6em";
  } else {
    warningDiv.style.display = "none";
  }
}

 const remainingTimeDiv = document.getElementById("remainingTime");

if (remainingMs <= 30000) {
  remainingTimeDiv.style.background = "#ffebee";
  remainingTimeDiv.style.border = "5px solid red";
  remainingTimeDiv.style.color = "red";
  remainingTimeDiv.style.transform = "scale(1.1)";
} else if (remainingMs <= 60000) {
  remainingTimeDiv.style.background = "#fff8e1";
  remainingTimeDiv.style.border = "4px solid #ff9800";
  remainingTimeDiv.style.color = "#e65100";
  remainingTimeDiv.style.transform = "scale(1.05)";
} else {
  remainingTimeDiv.style.background = "#e3f2fd";
  remainingTimeDiv.style.border = "4px solid #1976d2";
  remainingTimeDiv.style.color = "#0d47a1";
  remainingTimeDiv.style.transform = "scale(1)";
}
 
 members.forEach((name, index) => {
  const span = document.createElement("span");

  if (index === nextIndex) {

    span.textContent = "★ " + name;
    span.style.backgroundColor = "#e0f7ff";
    span.style.border = "2px solid #007bff";
    span.style.color = "#007bff";
    span.style.fontSize = "1.2em";
    span.style.fontWeight = "bold";
 
   
    // 30秒前はさらに強調
    if (remainingMs <= 30000) {
      span.style.backgroundColor = "#ffcccc";
      span.style.border = "3px solid red";
      span.style.color = "red";
      span.style.fontSize = "1.4em";
    }

  } else {
    span.textContent = name;
  }

  membersDiv.appendChild(span);
});
}

setInterval(updateTimer, 1000);
updateTimer();
</script>
