<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>役割交代タイマー</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding-top: 40px;
}
#msg {
  font-size: 2em;
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>役割交代タイマー</h1>
<div id="msg">準備中…</div>

<audio id="sound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const members = ["佐藤","鈴木","田中"];
const interval = 15 * 60 * 1000;

// 今から5分後に自動スタート（安全）
const start = new Date(Date.now() + 5 * 60 * 1000);

function update() {
  const msg = document.getElementById("msg");
  const sound = document.getElementById("sound");

  const now = new Date();
  const diff = now - start;

  if (diff < 0) {
    const remain = Math.ceil((-diff) / 1000);
    msg.textContent = "開始まで：" + remain + "秒";
    return;
  }

  const turn = Math.floor(diff / interval);
  const current = members[turn % members.length];

  const remain = interval - (diff % interval);
  const min = Math.floor(remain / 60000);
  const sec = Math.floor((remain % 60000) / 1000);

  msg.innerHTML =
    "現在の担当：" + current + "<br><br>" +
    "次の交代まで：" +
    String(min).padStart(2, "0") + ":" +
    String(sec).padStart(2, "0");

  if (remain > interval - 1000) {
    sound.play();
  }
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
