<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交代タイマー</title>

<style>
  body {
    background-color: #f0f8ff;
    font-family: sans-serif;
    text-align: center;
  }

  #currentTime {
    font-size: 1.2em;
    margin: 10px;
  }

  #remainingTime {
    font-size: 1.5em;
    margin: 15px;
  }

  #currentMember {
    font-size: 2em;
    font-weight: bold;
    border: 3px solid #333;
    background-color: #ffe4b5;
    padding: 15px;
    margin: 20px auto;
    width: fit-content;
    border-radius: 10px;
  }

  #members span {
    display: inline-block;
    border: 1px solid #666;
    padding: 6px 10px;
    margin: 5px;
    border-radius: 6px;
    background-color: #ffffff;
  }

  #nextLabel {
  font-size: 1.2em;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>交代タイマー</h1>
<button id="enableSound">🔊 音を有効にする</button>
<div id="loading">読み込み中…</div>

  <div id="currentTime"></div>

  <div id="remainingTime"></div>

  <div id="currentMember"></div>
  <div id="nextLabel">次の担当</div>
  <div id="members"></div>
  
<script>
const members = ["佐藤", "坂本", "田中"];
const intervalMinutes = 2;
  
const startTime = new Date();
startTime.setHours( 0, 26, 0, 0); // 9時00分00秒開始

  // ===== 音の設定 =====
  let audioEnabled = false;
  let audioContext = null;
  let lastIndex = -1;
  let lastMinuteBeeped = false;
  
function playBeep() {
  if (!audioContext) return;

  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.type = "sine";
  osc.frequency.value = 880; // 音の高さ
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start();
  osc.stop(audioContext.currentTime + 0.2); // 0.2秒
}
document.getElementById("enableSound")
  .addEventListener("click", () => {

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    if (audioContext.state === "suspended") {
      audioContext.resume();
    }

    audioEnabled = true;
    document.getElementById("enableSound").style.display = "none";
  });

function updateTimer() {

  const loading = document.getElementById("loading");
  if (loading) loading.style.display = "none";

  const now = new Date();
  
if (now < startTime) {
  document.getElementById("remainingTime").textContent =
    "準備中";
  return;
}
  
  // 現在時刻
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("currentTime").textContent =
    `現在時刻：${h}時${m}分${s}秒`;

  // 経過時間
  const elapsedMs = now - startTime;
  const intervalMs = intervalMinutes * 60 * 1000;
  const cycle = Math.floor(elapsedMs / intervalMs);

  // 現在の担当
  const currentIndex = cycle % members.length;

  // 担当が切り替わったらリセット
if (currentIndex !== lastIndex) {
  lastIndex = currentIndex;
  lastMinuteBeeped = false;
}
  document.getElementById("currentMember").textContent =
    `現在の担当：${members[currentIndex]}`;

  // 残り時間
  const remainingMs = intervalMs - (elapsedMs % intervalMs);

  // 残り1分になった瞬間に音を鳴らす
  if (remainingMs <= 60000 && !lastMinuteBeeped) {
  if (audioEnabled) playBeep();
  lastMinuteBeeped = true;
}
  
  // 残り時間（秒単位で計算）
const remainingSeconds = Math.ceil(remainingMs / 1000);
const remMin = Math.floor(remainingSeconds / 60);
const remSec = remainingSeconds % 60;

document.getElementById("remainingTime").textContent =
  `次の交代まで：${remMin}分${String(remSec).padStart(2, "0")}秒`;

  const nextIndex = (currentIndex + 1) % members.length;
  const isLastMinute = remainingMs <= 60000;

  const membersDiv = document.getElementById("members");
  membersDiv.innerHTML = "";

  members.forEach((name, index) => {
    const span = document.createElement("span");

    if (isLastMinute && index === nextIndex) {
      span.textContent = "★ " + name;
      span.style.backgroundColor = "#ffe4e1";
      span.style.border = "2px solid red";
      span.style.color = "red";
      span.style.fontSize = "1.3em";
      span.style.fontWeight = "bold";
    } else {
      span.textContent = name;
    }
    membersDiv.appendChild(span);
  });
}

setInterval(updateTimer, 1000);
updateTimer();
</script>
