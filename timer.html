<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交代タイマー</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding-top: 40px;
}
#msg {
  font-size: 2em;
  margin-top: 30px;
}
  .next {
  color: red;
  font-weight: bold;
  font-size: 1.3em;
}
</style>
</head>

<body>

<h1>交代タイマー</h1>
<div id="msg">準備中…</div>

<audio id="sound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const members = ["坂本","鈴木","田中"];
const interval = 15 * 60 * 1000;

const start = new Date("2026-02-28T23:36:00");

function update() {
  const msg = document.getElementById("msg");
  const sound = document.getElementById("sound");

  const now = new Date();
  const diff = now - start;

  if (diff < 0) {
    const remain = Math.ceil((-diff) / 1000);
    msg.textContent = "開始まで：" + remain + "秒";
    return;
  }

  const turn = Math.floor(diff / interval);
  const current = members[turn % members.length];
  const next = members[(turn + 1) % members.length];

  const remain = interval - (diff % interval);
  const min = Math.floor(remain / 60000);
  const sec = Math.floor((remain % 60000) / 1000);

let display =
  "現在の担当：" + current + "<br><br>" +
  "次の交代まで：" +
  String(min).padStart(2, "0") + ":" +
  String(sec).padStart(2, "0");

// 残り1分で交代準備表示
if (remain <= 60000) {
  display += "<br><br><strong>交代準備</strong><br>";

  members.forEach(name => {
    if (name === next) {
      display += "<span class='next'>★" + name + "★</span>　";
    } else {
      display += name + "　";
    }
  });
}

msg.innerHTML = display;
  if (remain > interval - 1000) {
    sound.play();
  }
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
